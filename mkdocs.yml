site_name: Resume Parser
site_description: LLM-powered resume extraction tool
site_url: https://example.com  # update when you host docs

docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Overview: ../README.md
  - Architecture:
      - Technical Design: architecture/technical-design.md
      - Architecture Diagrams: architecture/diagrams.md
  - Implementation:
      - Implementation Guide: implementation/guide.md
      - Knowledge Prerequisites: implementation/prerequisites.md
  - Project:
      - Roadmap: project/roadmap.md
      - Changelog: ../CHANGELOG.md
  - Reference:
      - Quick Reference: reference/quick-reference.md
      - API: api/API.md
  - Testing: testing/testing.md
  - Security & Legal:
      - Security Policy: ../SECURITY.md
      - License: ../LICENSE
      - Contributing: ../CONTRIBUTING.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite
  - footnotes
  - tables

plugins:
  - search

